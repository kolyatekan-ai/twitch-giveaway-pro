<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TwitchGiveaway Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#0f0f14;--bg2:#16161d;--bg3:#1c1c25;--bg4:#22222d;
--tx:#e8e8ed;--tx2:#8e8ea0;--tx3:#5a5a6e;
--pri:#9146ff;--pri-d:#6b2fc9;--pri-l:#b88aff;
--grn:#00e87b;--red:#ff4757;--blu:#00b4d8;--org:#ff8c42;--pnk:#ff6eb4;--ylw:#ffd93d;--tl:#00d4aa;
--r:12px;--r2:16px;--r3:20px;
--side:64px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--tx3);border-radius:3px;}

/* ===== SIDEBAR ===== */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--side);background:var(--bg2);border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;padding:12px 0;z-index:100;}
.side-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#9146ff,#00e87b);display:flex;align-items:center;justify-content:center;margin-bottom:20px;cursor:pointer;}
.side-logo svg{width:22px;height:22px;fill:white;}
.side-items{display:flex;flex-direction:column;gap:4px;flex:1;width:100%;padding:0 8px;}
.side-item{width:100%;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative;color:var(--tx3);}
.side-item:hover{background:rgba(255,255,255,.05);color:var(--tx2);}
.side-item.active{background:rgba(145,70,255,.15);color:var(--pri);}
.side-item.active::before{content:'';position:absolute;left:-8px;width:3px;height:20px;background:var(--pri);border-radius:0 3px 3px 0;}
.side-item svg{width:22px;height:22px;}
.side-item .tooltip{position:absolute;left:calc(100% + 10px);background:var(--bg4);color:var(--tx);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.side-item:hover .tooltip{opacity:1;}
.side-bottom{padding:0 8px;display:flex;flex-direction:column;gap:4px;width:100%;}

/* ===== MAIN ===== */
.main{margin-left:var(--side);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-title{font-size:20px;font-weight:800;}
.topbar-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(145,70,255,.12);color:var(--pri-l);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-btn{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--tx);cursor:pointer;font-family:'Inter';font-size:13px;font-weight:500;transition:.2s;}
.user-btn:hover{border-color:var(--pri);background:rgba(145,70,255,.08);}
.user-btn .avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#9146ff,#ff6eb4);display:flex;align-items:center;justify-content:center;font-size:14px;}
.twitch-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:10px;border:none;background:#9146ff;color:white;cursor:pointer;font-family:'Inter';font-size:13px;font-weight:600;transition:.2s;}
.twitch-btn:hover{background:#772ce8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(145,70,255,.4);}
.twitch-btn svg{width:18px;height:18px;fill:white;}
.content{flex:1;overflow-y:auto;padding:24px 28px;}

/* ===== PAGES ===== */
.page{display:none;animation:fadeIn .3s ease;}.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== CARDS ===== */
.card{background:var(--bg2);border-radius:var(--r2);border:1px solid rgba(255,255,255,.04);overflow:hidden;}
.card-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between;}
.card-head h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.card-head h3 .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.card-body{padding:20px;}

/* ===== STAT CARDS ===== */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border-radius:var(--r);border:1px solid rgba(255,255,255,.04);padding:16px 18px;display:flex;align-items:center;gap:14px;}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stat-icon svg{width:24px;height:24px;}
.stat-info .stat-val{font-size:22px;font-weight:800;line-height:1.2;}
.stat-info .stat-lbl{font-size:11px;color:var(--tx2);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* ===== WHEEL ===== */
.wheel-layout{display:grid;grid-template-columns:280px 1fr 320px;gap:20px;height:calc(100vh - 160px);}
.wheel-left{display:flex;flex-direction:column;gap:14px;overflow:hidden;}
.wheel-center{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
.wheel-right{display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.wheel-title{font-size:28px;font-weight:900;display:flex;align-items:center;gap:12px;}
.import-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--pri);background:transparent;color:var(--pri);font-family:'Inter';font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.import-btn:hover{background:rgba(145,70,255,.1);}
.participant-input{display:flex;gap:8px;margin-bottom:10px;}
.participant-input input{flex:1;padding:10px 14px;border-radius:var(--r);border:1px solid rgba(255,255,255,.08);background:var(--bg3);color:var(--tx);font-family:'Inter';font-size:13px;outline:none;transition:.2s;}
.participant-input input:focus{border-color:var(--pri);}
.participant-input input::placeholder{color:var(--tx3);}
.btn{padding:10px 18px;border-radius:var(--r);border:none;font-family:'Inter';font-weight:600;font-size:13px;cursor:pointer;transition:.2s;}
.btn-pri{background:var(--pri);color:white;}.btn-pri:hover{background:var(--pri-d);transform:translateY(-1px);}
.btn-grn{background:var(--grn);color:#0f0f14;}.btn-grn:hover{filter:brightness(1.1);}
.btn-org{background:var(--org);color:white;}.btn-org:hover{filter:brightness(1.1);}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid rgba(255,255,255,.08);}.btn-ghost:hover{border-color:var(--pri);color:var(--pri);}
.btn-red{background:rgba(255,71,87,.12);color:var(--red);border:1px solid rgba(255,71,87,.15);}.btn-red:hover{background:rgba(255,71,87,.2);}
.btn-sm{padding:7px 12px;font-size:11px;}
.participant-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.p-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;background:var(--bg3);font-size:13px;transition:.15s;cursor:default;}
.p-item:hover{background:var(--bg4);}
.p-item .p-name{display:flex;align-items:center;gap:8px;}
.p-item .p-weight{font-size:11px;color:var(--tx3);padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.04);}
.p-item .p-rm{width:22px;height:22px;border:none;border-radius:6px;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;}
.p-item:hover .p-rm{opacity:1;}.p-item .p-rm:hover{background:rgba(255,71,87,.15);color:var(--red);}
.p-count{font-size:12px;color:var(--tx2);padding:6px 0;text-align:center;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}

/* Wheel canvas area */
.wheel-outer{position:relative;}
.wheel-pointer-top{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:20;width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:30px solid var(--grn);filter:drop-shadow(0 2px 6px rgba(0,232,123,.5));}
#wheelCanvas{border-radius:50%;box-shadow:0 0 60px rgba(145,70,255,.15);cursor:pointer;}
.spin-area{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.spin-btn{padding:14px 52px;font-size:16px;font-weight:800;font-family:'Inter';border:none;border-radius:14px;background:linear-gradient(135deg,#9146ff,#00e87b);color:white;cursor:pointer;transition:.3s;text-transform:uppercase;letter-spacing:2px;}
.spin-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(145,70,255,.4);}
.spin-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.winner-box{text-align:center;padding:16px 24px;background:var(--bg2);border-radius:var(--r2);border:1px solid rgba(255,255,255,.04);}
.winner-box .wl{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.winner-box .wn{font-size:28px;font-weight:900;background:linear-gradient(135deg,#9146ff,#00e87b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.winner-box .wn.pop{animation:popIn .5s ease;}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

/* Wheel settings panel */
.w-set{display:flex;flex-direction:column;gap:10px;}
.w-set-group{padding:12px;border-radius:var(--r);background:var(--bg3);}
.w-set-group label{display:block;font-size:11px;color:var(--tx2);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.w-set-group select,.w-set-group input[type=number],.w-set-group input[type=text]{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:var(--bg);color:var(--tx);font-family:'Inter';font-size:12px;outline:none;transition:.2s;}
.w-set-group select:focus,.w-set-group input:focus{border-color:var(--pri);}
.w-set-group select option{background:var(--bg2);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
.toggle-row .tl{font-size:12px;font-weight:500;}
.toggle-row .td{font-size:10px;color:var(--tx3);}
.sw{width:38px;height:20px;border-radius:10px;background:rgba(255,255,255,.1);cursor:pointer;position:relative;transition:.2s;flex-shrink:0;}
.sw.on{background:var(--pri);}.sw::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:white;top:2px;left:2px;transition:.2s;}
.sw.on::after{transform:translateX(18px);}
.mode-tabs{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px;}
.mode-tab{flex:1;padding:8px;border:none;border-radius:6px;background:transparent;color:var(--tx3);font-family:'Inter';font-weight:600;font-size:11px;cursor:pointer;transition:.2s;}
.mode-tab.active{background:var(--pri);color:white;}
.mode-tab:hover:not(.active){color:var(--tx2);}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-row input[type=range]{flex:1;accent-color:var(--pri);}
.slider-row .sv{font-size:12px;font-weight:600;color:var(--pri);min-width:30px;text-align:right;}
.history-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--bg3);margin-bottom:4px;}
.history-item .h-medal{font-size:18px;}.history-item .h-info{flex:1;}
.history-item .h-name{font-size:12px;font-weight:600;}.history-item .h-time{font-size:10px;color:var(--tx3);}

/* ===== GIVEAWAY ===== */
.gw-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;}
.gw-banner{background:var(--bg2);border-radius:var(--r3);padding:40px;border:1px solid rgba(255,255,255,.04);text-align:center;position:relative;overflow:hidden;}
.gw-banner::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(145,70,255,.06),rgba(0,232,123,.04));}
.gw-timer{font-size:72px;font-weight:900;background:linear-gradient(135deg,#9146ff,#00e87b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-variant-numeric:tabular-nums;position:relative;line-height:1.2;}
.gw-status{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-top:12px;position:relative;}
.gw-status.on{background:rgba(0,232,123,.1);color:var(--grn);}.gw-status.off{background:rgba(255,71,87,.1);color:var(--red);}
.gw-controls{display:flex;gap:10px;margin-top:20px;justify-content:center;}
.gw-btn{padding:14px 32px;border:none;border-radius:12px;font-family:'Inter';font-weight:700;font-size:15px;cursor:pointer;transition:.2s;}
.gw-btn.start{background:linear-gradient(135deg,#9146ff,#00e87b);color:white;}.gw-btn.start:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(145,70,255,.4);}
.gw-btn.stop{background:linear-gradient(135deg,#ff6b35,#ff6eb4);color:white;}.gw-btn.stop:hover{transform:translateY(-2px);}
.gw-btn.rst{background:rgba(255,255,255,.06);color:var(--tx2);}.gw-btn.rst:hover{background:rgba(255,255,255,.1);}
.winner-reveal{display:none;text-align:center;padding:40px;background:var(--bg2);border-radius:var(--r3);border:2px solid var(--grn);margin-top:16px;}
.winner-reveal.show{display:block;animation:popIn .5s ease,glow 2s ease-in-out infinite .5s;}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(0,232,123,.15)}50%{box-shadow:0 0 35px rgba(0,232,123,.35)}}
.winner-reveal .crown{font-size:48px;margin-bottom:10px;}
.winner-reveal h2{font-size:14px;color:var(--tx2);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.winner-reveal .nm{font-size:42px;font-weight:900;background:linear-gradient(135deg,#9146ff,#00e87b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* ===== DONATE ===== */
.donate-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.donate-card{padding:14px;background:var(--bg3);border-radius:var(--r);border:1px solid rgba(255,255,255,.04);margin-bottom:8px;}
.donate-card .dc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.donate-card .dc-name{font-weight:700;font-size:13px;}.donate-card .dc-amount{font-weight:800;font-size:15px;color:var(--grn);}
.donate-card .dc-msg{font-size:11px;color:var(--tx2);}.donate-card .dc-time{font-size:10px;color:var(--tx3);margin-top:4px;}
.service-btn{display:flex;align-items:center;gap:8px;padding:12px 18px;border-radius:var(--r);border:1px solid rgba(255,255,255,.06);background:var(--bg3);color:var(--tx);cursor:pointer;font-family:'Inter';font-size:13px;font-weight:600;transition:.2s;width:100%;}
.service-btn:hover{border-color:var(--pri);background:var(--bg4);}
.service-btn .s-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.goal-bar{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:6px;}
.goal-fill{height:100%;background:linear-gradient(90deg,#9146ff,#00e87b);border-radius:4px;transition:width .5s;}

/* ===== SETTINGS ===== */
.settings-layout{display:grid;grid-template-columns:220px 1fr;gap:20px;}
.settings-nav{display:flex;flex-direction:column;gap:2px;}
.settings-nav .sn-group{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:12px 12px 6px;}
.settings-nav .sn-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;color:var(--tx2);}
.settings-nav .sn-item:hover{background:rgba(255,255,255,.04);color:var(--tx);}
.settings-nav .sn-item.active{background:rgba(145,70,255,.1);color:var(--pri);}
.settings-nav .sn-item svg{width:18px;height:18px;}
.settings-content{min-height:60vh;}
.settings-section{margin-bottom:28px;}
.settings-section h4{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.settings-section h4 .sec-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:11px;color:var(--tx2);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:var(--bg3);color:var(--tx);font-family:'Inter';font-size:13px;outline:none;transition:.2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--pri);}
.form-group textarea{resize:vertical;min-height:60px;}
.form-group select option{background:var(--bg2);}

/* ===== HISTORY ===== */
.history-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;}
.activity-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px;}
.act-cell{aspect-ratio:1;border-radius:3px;background:rgba(255,255,255,.03);}
.act-cell.l1{background:rgba(145,70,255,.15);}.act-cell.l2{background:rgba(145,70,255,.3);}.act-cell.l3{background:rgba(145,70,255,.5);}.act-cell.l4{background:rgba(145,70,255,.7);}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:10px;padding-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--pri),rgba(145,70,255,.3));transition:height .5s;min-height:2px;}
.bar-label{font-size:10px;color:var(--tx3);}

/* ===== CONFETTI ===== */
.confetti{position:fixed;z-index:9999;pointer-events:none;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ===== WIDGETS ===== */
.widget-card{width:200px;height:160px;border:2px dashed rgba(255,255,255,.1);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.2s;color:var(--tx3);}
.widget-card:hover{border-color:var(--pri);color:var(--pri);background:rgba(145,70,255,.04);}
.widget-card svg{width:32px;height:32px;}

@media(max-width:1200px){.wheel-layout,.gw-layout,.donate-layout,.settings-layout,.history-layout{grid-template-columns:1fr;}.stats-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.sidebar{width:48px;}.main{margin-left:48px;}.stats-row{grid-template-columns:1fr 1fr;}.topbar{padding:0 16px;}}
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<nav class="sidebar">
    <div class="side-logo" title="TwitchGiveaway Pro">
        <svg viewBox="0 0 24 24"><path d="M4 2h16a2 2 0 012 2v12a2 2 0 01-2 2H7l-5 4V4a2 2 0 012-2zm14 3l-3 3h-2l-1 2v2l-2 2h-2l-2 2v2l-1 1h-2l-2-2V9l2-2h2l1-2h4l3-2z"/></svg>
    </div>
    <div class="side-items">
        <div class="side-item active" onclick="showPage('wheel',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v10l7 4"/></svg>
            <span class="tooltip">Колесо</span>
        </div>
        <div class="side-item" onclick="showPage('giveaway',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M16 8V6a4 4 0 00-8 0v2"/><path d="M12 14v2"/></svg>
            <span class="tooltip">Розыгрыш</span>
        </div>
        <div class="side-item" onclick="showPage('raffle',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="8" r="1.5" fill="currentColor"/><circle cx="8" cy="16" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
            <span class="tooltip">Барабан</span>
        </div>
        <div class="side-item" onclick="showPage('history',this)">

// ===== TWITCH AUTH =====
const TWITCH_CLIENT_ID = 'YOUR_TWITCH_CLIENT_ID';
const REDIRECT_URI = window.location.origin + window.location.pathname;

function handleAuth() {
    if (APP.user) { APP.user = null; renderUser(); return; }
    const url = `https://id.twitch.tv/oauth2/authorize?client_id=${TWITCH_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=user:read:email`;
    window.location.href = url;
}

function checkAuth() {
    const hash = window.location.hash;
    if (hash.includes('access_token')) {
        const params = new URLSearchParams(hash.substring(1));
        const token = params.get('access_token');
        if (token) {
            fetch('https://api.twitch.tv/helix/users', { headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': TWITCH_CLIENT_ID } })
            .then(r => r.json())
            .then(data => {
                if (data.data && data.data[0]) {
                    APP.user = { name: data.data[0].display_name, login: data.data[0].login, avatar: data.data[0].profile_image_url, id: data.data[0].id };
                    renderUser();
                    window.history.replaceState(null, '', window.location.pathname);
                }
            }).catch(() => {});
        }
    }
}

function renderUser() {
    const btn = document.getElementById('userBtn');
    const avatar = document.getElementById('userAvatar');
    const name = document.getElementById('userName');
    if (APP.user) {
        avatar.innerHTML = `<img src="${APP.user.avatar}" style="width:100%;height:100%;border-radius:8px;">`;
        name.textContent = APP.user.name;
    } else {
        avatar.innerHTML = '👤';
        name.textContent = 'Войти через Twitch';
    }
}

// ===== WHEEL =====
function drawWheel() {
    const cv = document.getElementById('wheelCanvas');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const cx = cv.width/2, cy = cv.height/2, r = cx-8;
    const scheme = document.getElementById('wColorScheme')?.value || 'twitch';
    const cols = COLORS[scheme] || COLORS.twitch;
    const parts = APP.wheelParticipants.length > 0 ? APP.wheelParticipants : ['Участник 1','Участник 2','Участник 3','Участник 4'];
    const n = Math.max(parts.length, 2);
    const sl = 2*Math.PI/n;

    ctx.clearRect(0, 0, cv.width, cv.height);

    for (let i = 0; i < n; i++) {
        const sa = i*sl + APP.currentRotation;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,sa,sa+sl); ctx.closePath();
        ctx.fillStyle = cols[i%cols.length]; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.2)'; ctx.lineWidth = 2; ctx.stroke();

        ctx.save(); ctx.translate(cx,cy); ctx.rotate(sa+sl/2);
        ctx.textAlign = 'right'; ctx.fillStyle = '#fff'; ctx.shadowColor = 'rgba(0,0,0,.4)'; ctx.shadowBlur = 3;
        const nm = parts[i%parts.length];
        ctx.font = `bold ${nm.length>10?10:12}px Inter`;
        ctx.fillText(nm.length>13?nm.substring(0,11)+'…':nm, r-18, 4);
        ctx.restore();
    }

    ctx.beginPath(); ctx.arc(cx,cy,28,0,2*Math.PI); ctx.fillStyle = '#16161d'; ctx.fill();
    ctx.strokeStyle = '#9146ff'; ctx.lineWidth = 2; ctx.stroke();
}

function addRand(n) {
    const px=['xX_','_Pro_','Super','Mega','Dark','Shadow','Fire','Ice','Storm','Cyber','Neon','Pixel','Star','Moon','Dragon','Phoenix','Wolf','Eagle','King','Ace'];
    const sx=['Xx','_YT','_tv','420','GG','_live','_pro','1337','_TTV','_plays','YT'];
    for(let i=0;i<n;i++){let nm;do{nm=px[Math.floor(Math.random()*px.length)]+sx[Math.floor(Math.random()*sx.length)]+Math.floor(Math.random()*999);}while(APP.wheelParticipants.includes(nm));APP.wheelParticipants.push(nm);}
    rWL(); drawWheel();
}

function spinWheel() {
    if (APP.isSpinning || APP.wheelParticipants.length < 2) return;
    APP.isSpinning = true;
    document.getElementById('spinBtn').disabled = true;

    const speed = APP.settings.wheelSpeed;
    const bs = speed==='fast'?35:speed==='slow'?12:22;
    const tot = bs*(Math.random()*600+1800);
    const dur = 4000;
    const st = performance.now(), sr = APP.currentRotation;

    function ease(t){return 1-Math.pow(1-t,3);}
    function anim(t){
        const p = Math.min((t-st)/dur,1);
        APP.currentRotation = sr + tot*ease(p);
        drawWheel();
        if(p<1) requestAnimationFrame(anim);
        else { APP.isSpinning=false; document.getElementById('spinBtn').disabled=false; detWinner(); }
    }
    requestAnimationFrame(anim);
}

function detWinner() {
    const n = APP.wheelParticipants.length;
    const sl = 2*Math.PI/n;
    const nr = APP.currentRotation%(2*Math.PI);
    const pa = (2*Math.PI-nr)%(2*Math.PI);
    const wi = Math.floor(pa/sl)%n;
    const w = APP.wheelParticipants[wi];
    const el = document.getElementById('wWin');
    el.textContent = w;
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');

    APP.wheelHistory.unshift({name:w, time:new Date().toLocaleTimeString('ru-RU')});
    rWH();
    if(APP.settings.confetti) launchConfetti();

    if(APP.settings.removeWinner) {
        APP.wheelParticipants.splice(wi,1);
        rWL(); drawWheel();
    }
}

function rWH() {
    const l = document.getElementById('wHistory');
    if(!APP.wheelHistory.length){l.innerHTML='<div style="text-align:center;padding:16px;color:var(--tx3);font-size:12px;">Пусто</div>';return;}
    const m=['🥇','🥈','🥉'];

}

function startGW() {
    const t = document.getElementById('gwIn').value.trim();
    if(!t){alert('Добавьте участников!');return;}
    const names = t.split('\n').map(s=>s.trim()).filter(Boolean);
    if(!names.length){alert('Добавьте участников!');return;}
    APP.giveawayRunning=true;
    document.getElementById('gwGo').disabled=true;
    document.getElementById('gwStop').disabled=false;
    document.getElementById('gwRv').classList.remove('show');
    const st=document.getElementById('gwSt'); st.className='gw-status on'; st.innerHTML='<div style="width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.5s infinite;"></div>Идёт!';
    let tl=parseInt(document.getElementById('gwDur').value)||30;
    const te=document.getElementById('gwT'); te.textContent=fT(tl);
    APP.giveawayInterval=setInterval(()=>{tl--;te.textContent=fT(tl);if(tl<=0)stopGW();},1000);
}

function stopGW() {
    if(!APP.giveawayRunning)return;
    clearInterval(APP.giveawayInterval);
    APP.giveawayRunning=false;
    const t=document.getElementById('gwIn').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
    const c=parseInt(document.getElementById('gwWC').value)||1;
    const w=[...t].sort(()=>Math.random()-.5).slice(0,Math.min(c,t.length));
    const st=document.getElementById('gwSt'); st.className='gw-status off'; st.innerHTML='<div style="width:6px;height:6px;border-radius:50%;background:currentColor;"></div>Завершён!';
    document.getElementById('gwRv').classList.add('show');
    document.getElementById('gwWn').textContent=w.join(', ');
    document.getElementById('gwGo').disabled=false;
    document.getElementById('gwStop').disabled=true;
    document.getElementById('gwT').textContent='🎉';
    if(APP.settings.confetti) launchConfetti();
}

function rstGW() {
    clearInterval(APP.giveawayInterval); APP.giveawayRunning=false;
    document.getElementById('gwT').textContent='00:00';
    document.getElementById('gwRv').classList.remove('show');
    document.getElementById('gwGo').disabled=false;
    document.getElementById('gwStop').disabled=true;
    const st=document.getElementById('gwSt'); st.className='gw-status off'; st.innerHTML='<div style="width:6px;height:6px;border-radius:50%;background:currentColor;"></div>Ожидание';
}

}

function createWidget(type){alert('Виджет будет добавлен!');}

// ===== STORAGE =====
function saveToStorage(){try{localStorage.setItem('tw_giveaway',JSON.stringify(APP.wheelParticipants));}catch(e){}}
function loadFromStorage(){try{const d=localStorage.getItem('tw_giveaway');if(d)APP.wheelParticipants=JSON.parse(d);}catch(e){}rWL();}

// ===== KEYFRAMES =====
const style=document.createElement('style');style.textContent='@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}';document.head.appendChild(style);

// ===== HOTKEYS =====
document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    if(e.code==='Space'){e.preventDefault();if(!APP.isSpinning&&APP.wheelParticipants.length>=2)spinWheel();}
    else if(e.code==='Enter'&&!APP.giveawayRunning)startGW();
    else if(e.code==='Escape')stopGW();
});

// ===== INIT =====
init(); checkAuth(); initHistory();
</script>
